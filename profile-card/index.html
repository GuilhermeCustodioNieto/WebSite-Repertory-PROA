<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card UI Design</title>

    <!-- Boxicons CDN -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile-card">
      <div class="image">
        <img
          src="./profile-card-img.jpg"
          alt="profile card"
          class="profile-img"
        />
      </div>

      <div class="text-data">
        <span class="name">CodingLab</span>
        <span class="job">Youtuber & Blogger</span>
      </div>

      <div class="media-buttons">
        <a href="#" style="background-color: #4267b2" class="link btn facebook">
          <i class="bx bxl-facebook"></i>
        </a>
        <a
          href="#"
          style="background-color: #1da1f2"
          class="link btn instagram"
        >
          <i class="bx bxl-instagram"></i>
        </a>
        <a href="#" style="background-color: #e1306c" class="link btn youtube">
          <i class="bx bxl-youtube"></i>
        </a>
        <a href="#" style="background-color: #ff0000" class="link btn twitter">
          <i class="bx bxl-twitter"></i>
        </a>
      </div>

      <div class="buttons">
        <button class="button">Subscribe</button>
        <button class="button">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class="bx bx-heart"></i>
          <span class="number">60K</span>
        </div>

        <div class="data">
          <i class="bx bx-message-rounded"></i>
          <span class="number">20K</span>
        </div>

        <div class="data">
          <i class="bx bx-share"></i>
          <span class="number">12K</span>
        </div>
      </div>
    </div>
  </body>
</html>

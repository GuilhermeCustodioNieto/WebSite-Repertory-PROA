<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Camera WebSite</title>
  </head>
  <body>
    <div class="container">
      <div class="box one">
        <div class="details">
          <div class="topic">Description</div>
          <p>
            Lorem ipsum dolor, sit amet consectetur adipisicing elit. Harum quae
            voluptatem dicta, temporibus dolorum vel error autem nobis soluta
            molestiae culpa! Suscipit totam eum corrupti omnis itaque illo
            aliquid quis.
          </p>
          <div class="rating">
            <div class="fas fa-star"></div>
            <div class="fas fa-star"></div>
            <div class="fas fa-star"></div>
            <div class="fas fa-star"></div>
            <div class="fas fa-star"></div>
            <div class="fas fa-star"></div>
            <div class="fas fa-star"></div>
            <div class="fas fa-star"></div>
            <div class="far fa-star"></div>
            <div class="far fa-star"></div>
          </div>
          <div class="price-box">
            <div class="discount">$1800.00</div>
            <div class="price">$1500.00</div>
          </div>
        </div>

        <div class="button1">
          <button>Add To Cart</button>
        </div>
      </div>

      <div class="box two">
        <div class="image-box">
          <div class="image">
            <img src="assets/camera.png" alt="A camera image" />
          </div>
          <div class="info">
            <div class="brand">SONY</div>
            <div class="name">SONY ALPHA A7 KIT</div>
            <div class="shipping">FREE SHIPPING</div>
            <div class="button2">
              <button>Login For More</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
